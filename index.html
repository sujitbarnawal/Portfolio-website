<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujit Barnawal</title>
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(0, 0, 33);
            color: white;
            font-family: sans-serif, Tahoma, Geneva, Verdana;
        }

        .left {
            font-size: 1.5rem;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 80px;
            background-color: rgb(13, 13, 71);
        }

        nav .right ul {
            display: flex;
            justify-content: center;

        }

        nav .right ul li {
            list-style: none;
            margin: 0 23px;
        }

        .firstSection {
            display: flex;
            justify-content: space-around;
            margin: 80px 0;
        }

        .firstSection> div {
            width: 30%;
        }

        .leftSection {
            font-size: 3.5rem;
            margin: 70px 0;
        }

        .rightSection img {
            width: 80%;
            height: 115%;
            margin: 50px 0;
            border-radius: 50%;
        }
        .purple{
            color: rgb(170,107,228);
            font-size: 3.9rem;
        }
    </style>
</head>

<header>
    <nav>
        <div class="left">Sujit Barnawal</div>
        <div class="right">
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Services</li>
                <li>Projects</li>
                <li>Contact me</li>
            </ul>
        </div>
    </nav>
</header>

<main>
    <section class="firstSection">
        <div class="leftSection">
                Hi, My name is <span class="purple">Sujit</span>
            <div>and I am a passionate</div>
            <div>Web Developer</div>
        </div>
        <div class="rightSection">
            <img src="assets/pg.jpg" alt="">
        </div>
    </section>
</main>

<script src="script.js"></script>
</body>

</html>
